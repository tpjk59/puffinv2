<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puffin</title>
  <style>
    :root {
      --bg:           #f2f4f0;
      --card:         #ffffff;
      --accent:       #2d6a4f;
      --accent-2:     #52b788;
      --warn:         #e76f51;
      --warn-soft:    #fff3cd;
      --warn-softer:  #f8d7da;
      --text:         #1c1c1e;
      --muted:        #6b7280;
      --border:       #e5e7eb;
      --radius:       14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--accent);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    header time { font-size: 13px; opacity: 0.8; }
    #refresh-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }
    #refresh-btn:hover { background: rgba(255,255,255,0.3); }

    /* ── Layout ── */
    .container { max-width: 960px; margin: 0 auto; padding: 16px; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Ingredient list ── */
    .item-list { list-style: none; }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .item:last-child { border-bottom: none; }
    .item-name { font-weight: 500; }
    .item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .item-qty { color: var(--muted); font-size: 13px; }
    .badge {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-warn   { background: var(--warn-soft);   color: #856404; }
    .badge-urgent { background: var(--warn-softer);  color: #842029; }
    .badge-tag    { background: var(--border);        color: var(--muted); }

    /* ── Meal list ── */
    .meal {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .meal:last-child { border-bottom: none; }
    .meal-name { font-weight: 500; margin-bottom: 3px; }
    .meal-portions {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Cook plan ── */
    .cook-session {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .cook-session:last-child { border-bottom: none; }
    .cook-session-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 4px;
    }
    .cook-session-name { font-weight: 500; }
    .cook-session-date {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .cook-session-meta {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }
    .cook-session-portions {
      font-size: 13px;
      color: var(--muted);
    }
    .cook-ingredients {
      margin-top: 6px;
      padding-left: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .ing-badge {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 8px;
      font-weight: 500;
    }
    .ing-ok   { background: #d1fae5; color: #065f46; }
    .ing-miss { background: var(--warn-softer); color: #842029; }

    /* ── Delivery history ── */
    .delivery-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .delivery-item:last-child { border-bottom: none; }
    .delivery-source { font-weight: 500; }
    .delivery-meta   { color: var(--muted); }

    /* ── Meal plan / weekly grid ── */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .week-nav-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 3px 10px;
      cursor: pointer;
      font-size: 15px;
      color: var(--text);
      line-height: 1.4;
    }
    .week-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    #week-label { font-size: 13px; font-weight: 600; color: var(--text); min-width: 120px; text-align: center; }

    .week-grid { display: flex; flex-direction: column; }
    .week-col-headers {
      display: grid;
      grid-template-columns: 72px 1fr 1fr;
      gap: 6px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 4px;
    }
    .week-col-header {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding-left: 4px;
    }
    .week-row {
      display: grid;
      grid-template-columns: 72px 1fr 1fr;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      align-items: start;
    }
    .week-row:last-child { border-bottom: none; }
    .week-row.is-today .week-day-label { color: var(--accent); font-weight: 700; }
    .week-day-label {
      font-size: 12px;
      color: var(--muted);
      padding-top: 7px;
      font-weight: 500;
    }
    .week-slot {
      background: var(--bg);
      border-radius: 8px;
      padding: 7px 9px;
      min-height: 38px;
    }
    .week-slot.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 16px;
      font-weight: 300;
    }
    .week-slot-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 2px; }
    .week-slot-name { font-weight: 500; font-size: 13px; line-height: 1.3; }
    .week-slot-name a { color: inherit; text-decoration: none; }
    .week-slot-name a:hover { text-decoration: underline; }
    .week-slot-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }

    .badge-skipped { background: var(--border); color: var(--muted); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 0;
      font-size: 14px;
    }

    /* ── Loading ── */
    .loading { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<header>
  <h1>Puffin</h1>
  <time id="header-date"></time>
  <button id="refresh-btn" onclick="loadAll()">Refresh</button>
</header>

<div class="container">

  <!-- Inventory -->
  <div class="card">
    <div class="card-title">Inventory</div>
    <div class="tabs">
      <button class="tab active" data-loc="fresh"   onclick="switchTab('fresh')">Fresh</button>
      <button class="tab"        data-loc="freezer" onclick="switchTab('freezer')">Freezer</button>
      <button class="tab"        data-loc="pantry"  onclick="switchTab('pantry')">Pantry</button>
    </div>
    <div id="panel-fresh"   class="tab-panel active"><div class="loading">Loading...</div></div>
    <div id="panel-freezer" class="tab-panel"><div class="loading">Loading...</div></div>
    <div id="panel-pantry"  class="tab-panel"><div class="loading">Loading...</div></div>
  </div>

  <!-- Fresh meals / leftovers -->
  <div class="card">
    <div class="card-title">Fresh meals</div>
    <div id="fresh-meals-content"><div class="loading">Loading...</div></div>
  </div>

  <!-- Freezer meals -->
  <div class="card">
    <div class="card-title">Freezer meals</div>
    <div id="meals-content"><div class="loading">Loading...</div></div>
  </div>

  <!-- Meal plan -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">Meal plan</div>
      <div class="week-nav">
        <button class="week-nav-btn" onclick="shiftWeek(-7)">&#8592;</button>
        <span id="week-label"></span>
        <button class="week-nav-btn" onclick="shiftWeek(7)">&#8594;</button>
      </div>
    </div>
    <div id="week-plan-content"><div class="loading">Loading...</div></div>
  </div>

  <!-- Cook plan -->
  <div class="card">
    <div class="card-title">Cook plan</div>
    <div id="cook-plan-content"><div class="loading">Loading...</div></div>
  </div>

  <!-- Delivery history -->
  <div class="card">
    <div class="card-title">Delivery history</div>
    <div id="delivery-content"><div class="loading">Loading...</div></div>
  </div>

</div>

<script>
  const TODAY = new Date();
  TODAY.setHours(0, 0, 0, 0);

  document.getElementById('header-date').textContent =
    TODAY.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

  let currentWeekStart = getDefaultWeekStart();

  function getDefaultWeekStart() {
    const d = new Date(TODAY);
    const wd = d.getDay();
    if (wd === 0)      d.setDate(d.getDate() + 1);
    else if (wd === 6) d.setDate(d.getDate() + 2);
    else               d.setDate(d.getDate() - (wd - 1));
    return d;
  }

  function toISODate(d) {
    return d.toISOString().split('T')[0];
  }

  function shiftWeek(days) {
    currentWeekStart = new Date(currentWeekStart);
    currentWeekStart.setDate(currentWeekStart.getDate() + days);
    loadWeekPlan();
  }

  function daysUntil(iso) {
    if (!iso) return null;
    const d = new Date(iso + 'T00:00:00');
    return Math.ceil((d - TODAY) / 86400000);
  }

  async function safeFetch(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`${url} → ${r.status}`);
    return r.json();
  }

  async function loadAll() {
    document.getElementById('refresh-btn').textContent = '...';

    const [fresh, freezer, pantry, freshMeals, frozenMeals, deliveries] = await Promise.allSettled([
      safeFetch('/api/inventory?location=fresh'),
      safeFetch('/api/inventory?location=freezer'),
      safeFetch('/api/inventory?location=pantry'),
      safeFetch('/api/meals?location=fresh'),
      safeFetch('/api/meals?location=freezer'),
      safeFetch('/api/delivery-schedule'),
    ]);

    renderPanel('fresh',   fresh.status   === 'fulfilled' ? (fresh.value.ingredients   || []) : []);
    renderPanel('freezer', freezer.status === 'fulfilled' ? (freezer.value.ingredients || []) : []);
    renderPanel('pantry',  pantry.status  === 'fulfilled' ? (pantry.value.ingredients  || []) : []);
    renderFreshMeals(freshMeals.status  === 'fulfilled' ? (freshMeals.value.meals  || []) : []);
    renderMeals(frozenMeals.status === 'fulfilled' ? (frozenMeals.value.meals || []) : []);
    renderDeliveries(deliveries.status === 'fulfilled' ? (deliveries.value.schedules || []) : []);

    document.getElementById('refresh-btn').textContent = 'Refresh';
    await Promise.all([loadWeekPlan(), loadCookPlan()]);
  }

  async function loadWeekPlan() {
    document.getElementById('week-plan-content').innerHTML = '<div class="loading">Loading...</div>';
    const ws = toISODate(currentWeekStart);
    const we = new Date(currentWeekStart);
    we.setDate(we.getDate() + 6);
    const startFmt = currentWeekStart.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    const endFmt   = we.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    document.getElementById('week-label').textContent = `${startFmt} – ${endFmt}`;
    try {
      const data = await safeFetch(`/api/week-plan?week_start=${ws}`);
      renderWeekPlan(data);
    } catch (e) {
      document.getElementById('week-plan-content').innerHTML = '<div class="empty">Could not load meal plan</div>';
    }
  }

  async function loadCookPlan() {
    document.getElementById('cook-plan-content').innerHTML = '<div class="loading">Loading...</div>';
    try {
      const data = await safeFetch('/api/cook-plan');
      renderCookPlan(data.plans || [], data.aggregate_by_date || {});
    } catch (e) {
      document.getElementById('cook-plan-content').innerHTML = '<div class="empty">Could not load cook plan</div>';
    }
  }

  function renderPanel(loc, items) {
    const el = document.getElementById('panel-' + loc);
    if (!items.length) {
      el.innerHTML = '<div class="empty">Nothing here</div>';
      return;
    }
    items.sort((a, b) => {
      const da = a.best_before ? daysUntil(a.best_before) : 999;
      const db = b.best_before ? daysUntil(b.best_before) : 999;
      return da !== db ? da - db : a.name.localeCompare(b.name);
    });
    el.innerHTML = '<ul class="item-list">' + items.map(renderIngredient).join('') + '</ul>';
  }

  function renderIngredient(item) {
    const days = daysUntil(item.best_before);
    let badge = '';
    if (days !== null) {
      if (days <= 0)       badge = '<span class="badge badge-urgent">Expired</span>';
      else if (days === 1) badge = '<span class="badge badge-urgent">Tomorrow</span>';
      else if (days <= 3)  badge = `<span class="badge badge-warn">${days}d</span>`;
    }
    const qty = item.quantity % 1 === 0 ? item.quantity : (+item.quantity.toFixed(1));
    const subcat = item.subcategory ? `<span class="badge badge-tag">${item.subcategory}</span>` : '';
    return `<li class="item">
      <span class="item-name">${item.name}</span>
      <span class="item-meta">
        ${subcat}
        ${badge}
        <span class="item-qty">${qty}${item.unit}</span>
      </span>
    </li>`;
  }

  function renderFreshMeals(meals) {
    const el = document.getElementById('fresh-meals-content');
    if (!meals.length) {
      el.innerHTML = '<div class="empty">No leftovers</div>';
      return;
    }
    el.innerHTML = meals.map(m => {
      const cooked = new Date(m.cooked_date + 'T00:00:00');
      const age = Math.floor((TODAY - cooked) / 86400000);
      let ageBadge = '';
      if (age >= 4)      ageBadge = `<span class="badge badge-urgent">Day ${age} — eat today</span>`;
      else if (age >= 3) ageBadge = `<span class="badge badge-warn">Day ${age}</span>`;
      else if (age > 0)  ageBadge = `<span class="badge badge-tag">${age}d ago</span>`;
      else               ageBadge = `<span class="badge badge-tag">Today</span>`;
      return `<div class="meal">
        <div>
          <div class="meal-name">${m.name}</div>
          <span class="badge badge-tag">${m.cuisine_tag}</span>
          ${ageBadge}
        </div>
        <span class="meal-portions">${m.portions_remaining}<span style="font-weight:400;color:var(--muted)">/${m.total_portions}</span></span>
      </div>`;
    }).join('');
  }

  function renderMeals(meals) {
    const el = document.getElementById('meals-content');
    if (!meals.length) {
      el.innerHTML = '<div class="empty">No meals in the freezer</div>';
      return;
    }
    el.innerHTML = meals.map(m => `
      <div class="meal">
        <div>
          <div class="meal-name">${m.name}</div>
          <span class="badge badge-tag">${m.cuisine_tag}</span>
        </div>
        <span class="meal-portions">${m.portions_remaining}<span style="font-weight:400;color:var(--muted)">/${m.total_portions}</span></span>
      </div>`).join('');
  }

  function renderCookPlan(plans, aggregateByDate) {
    const el = document.getElementById('cook-plan-content');
    if (!plans.length) {
      el.innerHTML = '<div class="empty">No cook sessions planned — ask the agent to plan batch cooking</div>';
      return;
    }

    // Group by date
    const byDate = {};
    for (const p of plans) {
      if (!byDate[p.planned_date]) byDate[p.planned_date] = [];
      byDate[p.planned_date].push(p);
    }

    el.innerHTML = Object.entries(byDate).sort(([a], [b]) => a.localeCompare(b)).map(([dateStr, sessions]) => {
      const d = new Date(dateStr + 'T00:00:00');
      const isToday = dateStr === toISODate(TODAY);
      const dayDiff = Math.ceil((d - TODAY) / 86400000);
      let dateLabel = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
      if (isToday) dateLabel += ' <span class="badge badge-tag">Today</span>';
      else if (dayDiff === 1) dateLabel += ' <span class="badge badge-tag">Tomorrow</span>';

      const agg = aggregateByDate[dateStr] || [];

      return `<div style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;padding-bottom:6px;border-bottom:2px solid var(--border);margin-bottom:4px">${dateLabel}</div>
        ${sessions.map(renderCookSession).join('')}
        ${agg.length ? renderAggregateIngredients(agg) : ''}
      </div>`;
    }).join('');
  }

  function renderAggregateIngredients(agg) {
    const missing = agg.filter(i => !i.in_stock);
    const ok = agg.filter(i => i.in_stock);
    const rows = [...missing, ...ok].map(i => {
      const qty = i.needed % 1 === 0 ? i.needed : i.needed.toFixed(1);
      const haveStr = i.in_stock
        ? (i.have % 1 === 0 ? i.have : i.have.toFixed(1))
        : (i.have % 1 === 0 ? i.have : i.have.toFixed(1));
      const shortfallStr = i.shortfall > 0 ? ` <span style="color:var(--warn);font-weight:600">−${i.shortfall % 1 === 0 ? i.shortfall : i.shortfall.toFixed(1)}${i.unit}</span>` : '';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span style="display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${i.in_stock ? '#52b788' : '#e76f51'};flex-shrink:0"></span>
          ${i.name}
        </span>
        <span style="color:var(--muted);flex-shrink:0">${qty}${i.unit}${shortfallStr}</span>
      </div>`;
    }).join('');
    const allOk = missing.length === 0;
    return `<div style="margin-top:10px;background:var(--bg);border-radius:8px;padding:10px 12px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <span>All ingredients</span>
        ${allOk ? '<span class="badge ing-ok">✓ All in stock</span>' : `<span class="badge badge-warn">${missing.length} to buy</span>`}
      </div>
      ${rows}
    </div>`;
  }

  function renderCookSession(plan) {
    const ings = plan.ingredients || [];
    const allOk = plan.all_in_stock;
    const missingCount = ings.filter(i => !i.in_stock).length;

    const stockBadge = ings.length === 0 ? '' :
      allOk
        ? '<span class="badge ing-ok">✓ All in stock</span>'
        : `<span class="badge badge-warn">${missingCount} missing</span>`;

    const nameHtml = plan.source_url
      ? `<a href="${plan.source_url}" target="_blank" rel="noopener">${plan.name}</a>`
      : plan.name;

    const cuisineBadge = plan.cuisine_tag
      ? `<span class="badge badge-tag">${plan.cuisine_tag}</span>` : '';

    const statusBadge = plan.status && plan.status !== 'planned'
      ? `<span class="badge ${plan.status === 'cooked' ? 'ing-ok' : 'badge-skipped'}">${plan.status}</span>` : '';

    const ingList = ings.length
      ? `<div class="cook-ingredients">${ings.map(i =>
          `<span class="ing-badge ${i.in_stock ? 'ing-ok' : 'ing-miss'}">${i.name}</span>`
        ).join('')}</div>`
      : '';

    return `<div class="cook-session">
      <div class="cook-session-header">
        <span class="cook-session-name">${nameHtml}</span>
        <span class="cook-session-date">${plan.servings} portions</span>
      </div>
      <div class="cook-session-meta">
        ${cuisineBadge}${statusBadge}${stockBadge}
        ${plan.notes ? `<span class="badge badge-tag" title="${plan.notes}">note</span>` : ''}
      </div>
      ${ingList}
    </div>`;
  }

  function renderWeekPlan(data) {
    const el = document.getElementById('week-plan-content');
    const days = data.days || [];
    const todayIso = toISODate(TODAY);
    const hasAny = days.some(d => Object.keys(d.slots).length > 0);

    el.innerHTML =
      '<div class="week-grid">' +
      '<div class="week-col-headers">' +
        '<div></div>' +
        '<div class="week-col-header">Midday</div>' +
        '<div class="week-col-header">Dinner</div>' +
      '</div>' +
      days.map(day => {
        const isToday = day.date === todayIso;
        const d = new Date(day.date + 'T00:00:00');
        const dayLabel = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric' });
        const midday = day.slots['lunch'] || day.slots['brunch'] || null;
        const dinner = day.slots['dinner'] || null;
        const middayType = day.slots['brunch'] ? 'Brunch' : 'Lunch';
        return `<div class="week-row ${isToday ? 'is-today' : ''}">
          <div class="week-day-label">${dayLabel}</div>
          ${renderSlot(midday, middayType)}
          ${renderSlot(dinner, 'Dinner')}
        </div>`;
      }).join('') +
      '</div>' +
      (!hasAny ? '<div class="empty" style="margin-top:12px">No meals planned — ask the agent to plan the week</div>' : '');
  }

  function renderSlot(plan, typeLabel) {
    if (!plan) return '<div class="week-slot empty">—</div>';
    const isEatingOut = plan.name === 'Eating out';
    const statusBadge = plan.status === 'skipped'
      ? '<span class="badge badge-skipped">Skipped</span>'
      : plan.status === 'cooked'
      ? '<span class="badge ing-ok">Cooked</span>'
      : '';
    const availBadge = isEatingOut ? '' : plan.all_in_stock
      ? '<span class="badge ing-ok">✓ In stock</span>'
      : '<span class="badge badge-warn">Missing items</span>';
    const nameHtml = plan.source_url
      ? `<a href="${plan.source_url}" target="_blank" rel="noopener">${plan.name}</a>`
      : plan.name;
    const cuisineBadge = plan.cuisine_tag && !isEatingOut
      ? `<span class="badge badge-tag">${plan.cuisine_tag}</span>` : '';
    return `<div class="week-slot">
      <div class="week-slot-type">${typeLabel}</div>
      <div class="week-slot-name">${nameHtml}</div>
      <div class="week-slot-badges">${cuisineBadge}${statusBadge}${availBadge}</div>
    </div>`;
  }

  function renderDeliveries(schedules) {
    const el = document.getElementById('delivery-content');
    if (!schedules.length) {
      el.innerHTML = '<div class="empty">No scrape history yet</div>';
      return;
    }
    el.innerHTML = schedules.map(s => {
      const d = new Date(s.scraped_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      return `<div class="delivery-item">
        <span class="delivery-source">${s.source_label.replace(/_/g, ' ')}</span>
        <span class="delivery-meta">${s.item_count} items &middot; ${d}</span>
      </div>`;
    }).join('');
  }

  function switchTab(loc) {
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.loc === loc));
    document.querySelectorAll('.tab-panel').forEach(p =>
      p.classList.toggle('active', p.id === 'panel-' + loc));
  }

  loadAll();
</script>
</body>
</html>
